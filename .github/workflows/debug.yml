name: Debug Nginx
on:
  push:
    branches: [ "debug-ec2" ]

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Fetch Nginx logs
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo tail -n 200 /var/log/nginx/error.log' > nginx_error.log || true
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo cat /etc/nginx/sites-available/portfolio' > nginx_config.log || true
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo netstat -tulpn | grep LISTEN' > netstat.log || true

      - name: Commit and push logs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -f nginx_error.log nginx_config.log netstat.log
          git commit -m "Add nginx debug logs" || echo "No changes to commit"
          git push -u origin debug-ec2
