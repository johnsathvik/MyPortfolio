name: Debug EC2
on:
  push:
    branches: [ "debug-ec2" ]

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Fetch EC2 logs
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo journalctl -u portfolio-main -n 200 --no-pager' > main_service.log
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo journalctl -u portfolio-admin -n 200 --no-pager' > admin_service.log
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo systemctl status portfolio-main' >> main_service.log || true
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'sudo systemctl status portfolio-admin' >> admin_service.log || true

      - name: Commit and push logs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add main_service.log admin_service.log
          git commit -m "Add debug logs" || echo "No changes to commit"
          git push
